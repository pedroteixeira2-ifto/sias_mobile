name: sias_mobile
description: "SIAS Mobile — acompanhamento de fila e agendamento para o cidadão."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Gerenciamento de estado
  provider: ^6.1.2

  # Rede / HTTP (consumo da API Flask em app/routes/api.py)
  http: ^1.2.2

  # Persistência local segura (cookie de sessão, dados sensíveis)
  flutter_secure_storage: ^9.2.2

  # Persistência local simples (preferências não sensíveis)
  shared_preferences: ^2.3.2

  # QR Code do agendamento (Check-in Expresso na triagem)
  qr_flutter: ^4.1.0

  # Biometria para retorno rápido (ver §2.2 da especificação) — expansão futura
  local_auth: ^2.3.0

  # Formatação de datas/horas em pt-BR
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider: ^2.1.5
  path_provider_android: ^2.2.15